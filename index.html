<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星光熠熠耀 Polly：70 大壽無敵問答</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans HK', sans-serif;
            /* 生日喜慶 Feel: 玫瑰粉紅至深紅漸變 */
            background: radial-gradient(circle at top center, #ff719a 0%, #e11d48 40%, #881337 100%);
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation;
        }

        /* 閃粉/星光背景效果 */
        .stars {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 4s infinite linear;
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: translateY(0); }
            50% { opacity: 0.5; }
            100% { opacity: 0.2; transform: translateY(-50px); }
        }

        /* 霓虹字體發光效果 */
        .neon-text {
            text-shadow: 0 0 10px #fbbf24, 0 0 20px #f59e0b, 0 0 40px #d97706;
            color: #fef3c7;
        }
        
        .tvb-title {
            background: linear-gradient(to bottom, #fbbf24 0%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.8));
        }

        /* Kahoot Style Colors - Slightly richer for TVB feel */
        .opt-0 { background: linear-gradient(to bottom, #ef4444, #b91c1c); border-bottom: 6px solid #7f1d1d; }
        .opt-1 { background: linear-gradient(to bottom, #3b82f6, #1d4ed8); border-bottom: 6px solid #1e3a8a; }
        .opt-2 { background: linear-gradient(to bottom, #f59e0b, #b45309); border-bottom: 6px solid #78350f; }
        .opt-3 { background: linear-gradient(to bottom, #10b981, #047857); border-bottom: 6px solid #064e3b; }

        .opt-btn { transition: transform 0.1s; }
        .opt-btn:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 2px; }
        .opt-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .leaderboard-row {
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0; transform: translateX(-50px);
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255,215,0,0.3);
        }
        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }
        
        .finale-row {
             background: rgba(0,0,0,0.4);
             border: 1px solid rgba(255,215,0,0.2);
             border-radius: 12px;
             padding: 8px 16px;
        }

        /* ===== 手機修復：確保問答畫面填滿螢幕，4 個按鈕有真正高度 ===== */
        /* Mobile fix: force the player quiz screen to fill the phone and give the 4 buttons real height */
        #player-quiz {
            height: 100vh;            /* fallback for older browsers */
            height: 100dvh;           /* mobile-safe: ignores the moving address bar */
            max-height: 100dvh;
        }
        #player-quiz .pq-answer-grid {
            flex: 1 1 0%;             /* take all remaining vertical space */
            min-height: 0;            /* critical: stops the grid collapsing to zero on mobile */
        }
        #player-quiz .pq-answer-grid > button {
            min-height: 0;
            height: 100%;
        }
    </style>
</head>
<body class="text-white h-screen w-screen overflow-hidden flex flex-col items-center justify-center relative">
    <div class="stars"></div>

    <!-- ==================== HOME SCREEN ==================== -->
    <div id="home-screen" class="z-10 flex flex-col items-center justify-center w-full h-full p-8 text-center">
        <div class="mb-4 animate-bounce">
            <i class="fa-solid fa-crown text-6xl text-yellow-400 drop-shadow-lg"></i>
        </div>
        <h1 class="text-5xl md:text-8xl font-black tvb-title mb-2">星光熠熠耀 Polly</h1>
        <h2 class="text-3xl md:text-5xl font-bold neon-text mb-12">70 大壽無敵問答</h2>
        
        <div class="flex flex-col gap-6 w-full max-w-md">
            <button onclick="initHost()" class="bg-gradient-to-r from-yellow-400 to-yellow-600 text-slate-900 font-bold text-3xl py-6 rounded-full shadow-[0_6px_0_#92400e] active:translate-y-2 active:shadow-none transition-all hover:scale-105">
                <i class="fa-solid fa-tv mr-2"></i> 我係主持 (大電視)
            </button>
        </div>
        <p class="mt-8 text-yellow-200/70 text-lg">（玩家請望住大電視，準備掃描 QR Code）</p>
    </div>

    <!-- ==================== HOST SCREENS ==================== -->
    
    <div id="host-lobby" class="z-10 hidden flex-col items-center justify-center w-full h-full p-4 md:p-8">
        <div class="bg-black/40 p-8 rounded-3xl backdrop-blur-md border border-yellow-500/30 shadow-[0_0_50px_rgba(255,215,0,0.1)] flex flex-col md:flex-row items-center gap-12 max-w-5xl w-full">
            <div class="flex flex-col items-center">
                <h2 class="text-3xl font-bold mb-4 text-yellow-300"><i class="fa-solid fa-mobile-screen mr-2"></i>手機掃描加入！</h2>
                <div id="qrcode" class="p-4 bg-white rounded-xl shadow-lg mb-4 border-4 border-yellow-400"></div>
                <p class="text-2xl text-yellow-400 font-bold bg-black/50 px-6 py-2 rounded-full">嘉賓人數：<span id="player-count" class="text-white">0</span></p>
            </div>
            <div class="flex-grow w-full flex flex-col h-96">
                <h3 class="text-2xl font-bold mb-4 border-b border-yellow-500/30 pb-2 text-yellow-200">星級嘉賓名單</h3>
                <div id="player-list" class="flex-grow overflow-y-auto flex flex-wrap gap-3 content-start">
                    <!-- Player names appear here -->
                </div>
                <button onclick="startHostGame()" id="start-game-btn" disabled class="mt-6 bg-gradient-to-r from-red-500 to-red-700 disabled:from-gray-600 disabled:to-gray-700 disabled:shadow-none text-white font-bold text-3xl py-4 rounded-full shadow-[0_6px_0_#7f1d1d] active:translate-y-2 transition-all w-full tracking-wider">
                    Show Time！開始遊戲 <i class="fa-solid fa-clapperboard ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="host-quiz" class="z-10 hidden flex-col w-full h-full max-w-7xl mx-auto p-4 md:p-8">
        <div class="flex justify-between items-center mb-6 bg-black/40 px-6 py-3 rounded-full backdrop-blur-sm border border-yellow-500/30">
            <span class="text-2xl font-bold text-yellow-400"><i class="fa-solid fa-circle-question mr-2"></i>第 <span id="host-q-current">1</span> 題 / 10</span>
            <span class="text-xl font-bold text-pink-200"><i class="fa-solid fa-users mr-2"></i>已按掣: <span id="answered-count" class="text-white text-2xl">0</span></span>
        </div>
        <div class="flex-grow flex items-center justify-center bg-gradient-to-b from-white/10 to-transparent border border-white/20 rounded-3xl shadow-2xl mb-8 p-8 text-center min-h-[30vh] backdrop-blur-sm relative overflow-hidden">
             <!-- Spotlight effect -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-full bg-gradient-to-b from-pink-200/20 to-transparent pointer-events-none rounded-full blur-3xl"></div>
            <h2 id="host-q-text" class="text-4xl md:text-6xl font-bold leading-tight text-white drop-shadow-lg z-10">問題載入中...</h2>
        </div>
        <div class="grid grid-cols-2 gap-4 h-2/5">
            <div id="host-opt-0" class="opt-0 rounded-2xl p-6 flex items-center justify-start text-left shadow-lg relative overflow-hidden transition-all duration-500">
                <i class="fa-solid fa-play fa-rotate-270 text-5xl text-white/80 drop-shadow-md mr-6 w-12 text-center"></i>
                <span id="host-t-0" class="text-3xl md:text-4xl font-bold text-white drop-shadow-md">選項 A</span>
                <span id="host-count-0" class="absolute right-6 text-6xl font-black text-white/30 hidden">0</span>
            </div>
            <div id="host-opt-1" class="opt-1 rounded-2xl p-6 flex items-center justify-start text-left shadow-lg relative overflow-hidden transition-all duration-500">
                <i class="fa-solid fa-diamond text-5xl text-white/80 drop-shadow-md mr-6 w-12 text-center"></i>
                <span id="host-t-1" class="text-3xl md:text-4xl font-bold text-white drop-shadow-md">選項 B</span>
                <span id="host-count-1" class="absolute right-6 text-6xl font-black text-white/30 hidden">0</span>
            </div>
            <div id="host-opt-2" class="opt-2 rounded-2xl p-6 flex items-center justify-start text-left shadow-lg relative overflow-hidden transition-all duration-500">
                <i class="fa-solid fa-circle text-5xl text-white/80 drop-shadow-md mr-6 w-12 text-center"></i>
                <span id="host-t-2" class="text-3xl md:text-4xl font-bold text-white drop-shadow-md">選項 C</span>
                <span id="host-count-2" class="absolute right-6 text-6xl font-black text-white/30 hidden">0</span>
            </div>
            <div id="host-opt-3" class="opt-3 rounded-2xl p-6 flex items-center justify-start text-left shadow-lg relative overflow-hidden transition-all duration-500">
                <i class="fa-solid fa-square text-5xl text-white/80 drop-shadow-md mr-6 w-12 text-center"></i>
                <span id="host-t-3" class="text-3xl md:text-4xl font-bold text-white drop-shadow-md">選項 D</span>
                <span id="host-count-3" class="absolute right-6 text-6xl font-black text-white/30 hidden">0</span>
            </div>
        </div>
        <div class="mt-6 flex justify-center h-16">
            <button id="host-reveal-btn" onclick="hostRevealAnswer()" class="bg-white text-indigo-900 font-bold text-2xl py-3 px-12 rounded-full shadow-[0_6px_0_#cbd5e1] active:translate-y-2 transition-all hover:bg-gray-100">
                <i class="fa-solid fa-eye mr-2"></i> 主持：開估！
            </button>
            <button id="host-next-btn" onclick="hostShowLeaderboard()" class="hidden bg-gradient-to-r from-yellow-400 to-yellow-500 text-slate-900 font-bold text-2xl py-3 px-12 rounded-full shadow-[0_6px_0_#a16207] active:translate-y-2 transition-all hover:scale-105">
                睇排行榜 <i class="fa-solid fa-trophy ml-2"></i>
            </button>
        </div>
    </div>

    <div id="host-leaderboard" class="z-10 hidden flex-col items-center w-full h-full max-w-4xl mx-auto p-8">
        <h2 class="text-5xl font-black neon-text mb-8"><i class="fa-solid fa-ranking-star mr-3"></i> 積分榜</h2>
        <div id="leaderboard-list" class="w-full flex-grow flex flex-col gap-4">
            <!-- Ranks injected here -->
        </div>
        <button onclick="hostNextQuestion()" class="mt-8 bg-white text-indigo-900 font-bold text-3xl py-4 px-16 rounded-full shadow-[0_6px_0_#cbd5e1] active:translate-y-2 transition-all hover:bg-gray-100">
            下一題 <i class="fa-solid fa-arrow-right ml-2"></i>
        </button>
    </div>

    <!-- Final Leaderboard Screen -->
    <div id="host-finale" class="z-10 hidden flex-col items-center w-full h-full max-w-6xl mx-auto p-4 md:p-8">
        <i class="fa-solid fa-cake-candles text-7xl text-yellow-400 mb-4 animate-bounce"></i>
        <h1 class="text-5xl md:text-7xl font-black tvb-title mb-2">祝 Polly 媽媽生日快樂！</h1>
        <h2 class="text-3xl md:text-4xl font-bold text-yellow-300 mb-8 drop-shadow-xl">永遠健康、喜樂平安！</h2>
        
        <div class="bg-black/50 border border-yellow-500/50 rounded-3xl p-6 w-full flex-grow flex flex-col backdrop-blur-md">
            <h3 class="text-2xl text-center text-yellow-200 font-bold mb-4 border-b border-yellow-500/30 pb-2"><i class="fa-solid fa-medal mr-2"></i> 十大星級嘉賓排行榜</h3>
            <div class="grid grid-cols-2 gap-x-8 gap-y-3 flex-grow" id="finale-list">
                <!-- Top 10 injected here -->
            </div>
        </div>
    </div>

    <!-- ==================== PLAYER SCREENS (Mobile) ==================== -->
    
    <div id="player-join" class="z-10 hidden flex-col items-center justify-center w-full h-full p-6 text-center">
        <div class="bg-gradient-to-b from-rose-800 to-rose-950 p-8 rounded-3xl w-full max-w-sm shadow-2xl border border-yellow-400/50">
            <h2 class="text-3xl font-black text-yellow-400 mb-6">嘉賓進場</h2>
            <input type="text" id="player-name-input" placeholder="輸入你嘅大名" class="w-full text-2xl p-4 border-2 border-rose-600 bg-rose-900/50 text-white rounded-xl mb-6 text-center font-bold focus:border-yellow-400 focus:outline-none placeholder-rose-300">
            <button onclick="joinGame()" class="w-full bg-gradient-to-r from-yellow-400 to-yellow-600 text-red-950 font-bold text-2xl py-4 rounded-xl shadow-[0_6px_0_#92400e] active:translate-y-2 transition-all">
                入席！
            </button>
            <p id="join-status" class="mt-4 text-yellow-300 font-bold hidden"><i class="fa-solid fa-spinner fa-spin mr-2"></i>連線中...</p>
        </div>
    </div>

    <!-- 已修復重疊問題的 Player Wait 畫面 -->
    <div id="player-wait" class="z-10 hidden flex-col items-center justify-center w-full h-full p-8 text-center">
        <i class="fa-solid fa-champagne-glasses text-6xl text-yellow-400 mb-6 animate-pulse"></i>
        <h2 class="text-4xl font-bold mb-4 text-yellow-200">準備就緒！</h2>
        <p class="text-2xl text-white/80">請望住大電視，等候 Polly 姐發辦...</p>
        <div class="mt-12 bg-black/40 px-6 py-3 rounded-full text-xl font-bold border border-yellow-500/30 text-yellow-400">
            <i class="fa-solid fa-user-star mr-2"></i> <span id="my-name-display"></span>
        </div>
    </div>

    <div id="player-quiz" class="z-10 hidden flex-col w-full h-full p-4 bg-rose-950">
        <div class="flex justify-between items-center mb-4 text-xl font-bold">
            <span class="bg-black/40 border border-rose-600 px-4 py-2 rounded-full text-pink-200">第 <span id="player-q-current">1</span> 題</span>
            <span class="bg-black/40 border border-yellow-600/50 px-4 py-2 rounded-full"><i class="fa-solid fa-star text-yellow-400"></i> <span id="my-score">0</span></span>
        </div>
        <div class="pq-answer-grid grid grid-cols-2 grid-rows-2 gap-4 flex-grow pb-4">
            <button onclick="submitAnswer(0)" id="p-btn-0" class="opt-btn opt-0 rounded-2xl flex items-center justify-center shadow-lg w-full h-full">
                <i class="fa-solid fa-play fa-rotate-270 text-7xl text-white/90 drop-shadow-md"></i>
            </button>
            <button onclick="submitAnswer(1)" id="p-btn-1" class="opt-btn opt-1 rounded-2xl flex items-center justify-center shadow-lg w-full h-full">
                <i class="fa-solid fa-diamond text-7xl text-white/90 drop-shadow-md"></i>
            </button>
            <button onclick="submitAnswer(2)" id="p-btn-2" class="opt-btn opt-2 rounded-2xl flex items-center justify-center shadow-lg w-full h-full">
                <i class="fa-solid fa-circle text-7xl text-white/90 drop-shadow-md"></i>
            </button>
            <button onclick="submitAnswer(3)" id="p-btn-3" class="opt-btn opt-3 rounded-2xl flex items-center justify-center shadow-lg w-full h-full">
                <i class="fa-solid fa-square text-7xl text-white/90 drop-shadow-md"></i>
            </button>
        </div>
        <div id="player-answered-msg" class="absolute inset-0 bg-rose-950/95 hidden flex-col items-center justify-center z-20 backdrop-blur-sm">
            <i class="fa-solid fa-check-double text-7xl text-green-400 mb-6"></i>
            <h2 class="text-5xl font-bold text-white tracking-widest">已鎖定</h2>
            <p class="text-2xl text-pink-200 mt-4">請望住大電視等開估</p>
        </div>
    </div>

    <div id="player-result" class="z-10 hidden flex-col items-center justify-center w-full h-full p-8 text-center transition-colors duration-500">
        <i id="result-icon" class="fa-solid text-8xl mb-6"></i>
        <h2 id="result-title" class="text-5xl font-black mb-4"></h2>
        <div class="bg-black/30 px-10 py-6 rounded-3xl mt-8 border border-white/20">
            <p class="text-xl text-white/80 mb-2">累積總分</p>
            <p id="result-score" class="text-6xl font-bold text-yellow-300">0</p>
        </div>
    </div>

    <!-- Reconnecting overlay (player) -->
    <div id="reconnect-overlay" class="hidden fixed inset-0 z-50 flex-col items-center justify-center bg-black/85 backdrop-blur-sm p-8 text-center">
        <i class="fa-solid fa-rotate fa-spin text-6xl text-yellow-400 mb-6"></i>
        <h2 class="text-3xl font-bold text-yellow-200 mb-2">重新連線中...</h2>
        <p class="text-lg text-white/70">請保持 WiFi 開啟，唔好熄屏幕太耐<br>你嘅分數會保留</p>
    </div>

    <script>
        // 專屬 Polly 媽媽的 10 條問題
        const questions = [
            { q: "1. 媽媽去酒樓飲茶，邊一籠點心係佢嘅「必點」？", options: ["晶瑩蝦餃皇", "蟹籽燒賣", "豉汁蒸排骨", "醬皇鳳爪"], answer: 0 },
            { q: "2. 媽媽平時喺屋企，最鍾意睇邊類電視節目？", options: ["愛·回家", "無綫新聞", "肥媽煮食節目", "韓劇"], answer: 3 },
            { q: "3. 媽媽出嚟社會做嘢，人生第一份工係做咩行業？", options: ["製衣廠", "教小學", "寫字樓文員", "百貨公司"], answer: 1 },
            { q: "4. 媽媽出人生第一份糧嗰陣，買咗咩畀自己？", options: ["手錶", "太陽眼鏡", "靚衫", "化妝品"], answer: 2 },
            { q: "5. 細個讀書嗰陣，媽媽邊一科成績最差？", options: ["中國語文", "英國語文", "體育", "數學"], answer: 3 },
            { q: "6. 後生嗰陣，媽媽覺得邊個男明星最型、最靚仔？", options: ["周潤發", "張國榮", "劉德華", "鄭少秋"], answer: 1 },
            { q: "7. 咁多年嚟，媽媽最常對住啲仔女講嘅「口頭禪」係咩？", options: ["食咗飯未呀？", "靚仔", "著多件衫呀！", "早啲瞓啦！"], answer: 1 },
            { q: "8. 媽媽通常去到夜晚幾點鐘，就一定要上床瞓覺？", options: ["夜晚 10 點", "半夜 12 點", "凌晨 2 點前", "天光先瞓"], answer: 2 },
            { q: "9. 如果而家可以即刻食一餐好嘅，媽媽最想食咩？", options: ["大牌檔海鮮", "酒店自助餐", "傳統中菜", "日本壽司"], answer: 1 },
            { q: "10. Polly 生日正日其實係幾多號？", options: ["6月1日", "6月2日", "6月3日", "6月4日"], answer: 2 }
        ];

        // System Variables
        let peer = null;
        let hostConn = null;
        let playersData = {}; // keyed by clientId: { conn, name, score, currentAnswer, connected }
        
        let currentQIndex = 0;
        let isHost = false;
        let myName = "";
        let myScore = 0;

        // --- Reliability state (for 30+ players: rejoin + auto-reconnect) ---
        let gameStarted = false;          // host: true once Show Time pressed
        let gamePhase = 'lobby';          // host: 'lobby' | 'question' | 'reveal' | 'leaderboard' | 'finale'
        let hostId = null;                // player: the room id from the URL
        let myClientId = null;            // player: stable id saved on this phone
        let manualClose = false;          // player: true only if we intentionally leave
        let reconnectTimer = null;        // player: pending reconnect attempt

        // Read/create a stable id for this phone so a refresh keeps the same score
        function ensureClientId() {
            try {
                myClientId = localStorage.getItem('quiz_client_id');
                if (!myClientId) {
                    myClientId = 'p_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
                    localStorage.setItem('quiz_client_id', myClientId);
                }
            } catch (e) {
                myClientId = 'p_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
            }
        }

        // Auto-detect Role based on URL
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            hostId = urlParams.get('room');
            if (hostId) {
                ensureClientId();
                hideAll();
                document.getElementById('player-join').classList.remove('hidden');
                document.getElementById('player-join').classList.add('flex');

                // Prefill the name we used last time on this phone
                try {
                    const savedName = localStorage.getItem('quiz_player_name');
                    if (savedName) document.getElementById('player-name-input').value = savedName;
                } catch (e) {}

                // If the phone wakes up / regains network, quietly reconnect
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'visible' && myName && !manualClose &&
                        (!hostConn || !hostConn.open)) scheduleReconnect();
                });
                window.addEventListener('online', () => {
                    if (myName && !manualClose && (!hostConn || !hostConn.open)) scheduleReconnect();
                });
            } else {
                document.getElementById('home-screen').classList.remove('hidden');
            }
        };

        function hideAll() {
            const screens = ['home-screen', 'host-lobby', 'host-quiz', 'host-leaderboard', 'host-finale', 'player-join', 'player-wait', 'player-quiz', 'player-result'];
            screens.forEach(id => {
                document.getElementById(id).classList.add('hidden');
                document.getElementById(id).classList.remove('flex');
            });
        }

        /* ==================== HOST LOGIC ==================== */
        
        function initHost() {
            hideAll();
            document.getElementById('host-lobby').classList.remove('hidden');
            document.getElementById('host-lobby').classList.add('flex');
            isHost = true;
            gameStarted = false;
            gamePhase = 'lobby';

            const qrDiv = document.getElementById("qrcode");
            qrDiv.innerHTML = '<div class="text-yellow-500 flex flex-col items-center py-8"><i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i><p class="font-bold">連線中...</p></div>';
            
            peer = new Peer(); 
            peer.on('open', (id) => {
                qrDiv.innerHTML = ''; 
                
                const baseUrl = window.location.href.split('?')[0];
                const joinUrl = baseUrl + '?room=' + id;
                console.log("Game URL: ", joinUrl);
                
                try {
                    new QRCode(qrDiv, {
                        text: joinUrl, 
                        width: 200, 
                        height: 200,
                        colorDark : "#0f172a", 
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.L
                    });
                    
                    const urlDiv = document.createElement('div');
                    urlDiv.className = 'mt-3 text-sm text-slate-700 break-all max-w-[200px] text-center font-bold bg-yellow-100 p-2 rounded';
                    urlDiv.innerHTML = `掃唔到？請輸入網址:<br><span class="text-blue-600">${joinUrl}</span>`;
                    qrDiv.appendChild(urlDiv);
                } catch(e) {
                    console.error("QR Error:", e);
                    qrDiv.innerHTML = '<p class="text-red-500 font-bold p-4">QR Code 發生錯誤，請重新整理。</p>';
                }
            });

            peer.on('error', (err) => {
                qrDiv.innerHTML = `<div class="text-red-500 font-bold text-center p-4"><i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i><br>伺服器連線失敗<br>請檢查網絡並重新整理。</div>`;
            });

            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'JOIN') {
                        handlePlayerJoin(conn, data);
                    }
                    if (data.type === 'ANSWER') {
                        if (gamePhase !== 'question') return;
                        const key = findKeyByConn(conn);
                        if (key) {
                            playersData[key].currentAnswer = data.answer;
                            updateAnsweredCount();
                        }
                    }
                });

                conn.on('close', () => {
                    // Only act if this is still the player's CURRENT connection.
                    // (If they already reconnected, a stale close must be ignored.)
                    const key = findKeyByConn(conn);
                    if (!key) return;
                    if (!gameStarted) {
                        // Still in the lobby: drop them so the count stays clean.
                        delete playersData[key];
                    } else {
                        // Mid-game: keep their score, just mark them offline.
                        playersData[key].connected = false;
                    }
                    updateLobbyUI();
                    updateAnsweredCount();
                });
            });
        }

        // Find a player record by its live connection object
        function findKeyByConn(conn) {
            return Object.keys(playersData).find(k => playersData[k].conn === conn);
        }

        // Handle a JOIN, whether it's a brand-new player or a returning one
        function handlePlayerJoin(conn, data) {
            const name = (data.name || '').toString().trim().slice(0, 20) || '嘉賓';
            const cid = data.clientId || ('peer_' + conn.peer);
            let player = playersData[cid];

            // Same phone returning (matched by stored id) -> keep score
            if (!player) {
                // Different phone / cleared storage: adopt a disconnected same-name slot
                const oldKey = Object.keys(playersData).find(k =>
                    !playersData[k].connected &&
                    playersData[k].name.toLowerCase() === name.toLowerCase());
                if (oldKey) {
                    player = playersData[oldKey];
                    delete playersData[oldKey];
                    playersData[cid] = player;
                }
            }

            if (player) {
                player.conn = conn;
                player.name = name;
                player.connected = true;
            } else {
                player = playersData[cid] = {
                    conn: conn, name: name, score: 0, currentAnswer: null, connected: true
                };
            }

            safeSend(player, { type: 'JOIN_SUCCESS', score: player.score });
            updateLobbyUI();
            if (gameStarted) resyncPlayer(player);   // returning mid-game -> put them on the right screen
        }

        // Bring a (re)connecting player to whatever is happening right now
        function resyncPlayer(player) {
            if (gamePhase === 'question') {
                if (player.currentAnswer === null) {
                    safeSend(player, { type: 'STATE_QUESTION', qNum: currentQIndex + 1, score: player.score });
                } else {
                    safeSend(player, { type: 'STATE_WAITING', msg: '已收到你嘅答案，請望住大電視等開估！', score: player.score });
                }
            } else if (gamePhase === 'finale') {
                safeSend(player, { type: 'STATE_WAITING', msg: '全集完滿結束！多謝參與！', score: player.score });
            } else {
                safeSend(player, { type: 'STATE_WAITING', msg: '歡迎返嚟！請望住大電視。', score: player.score });
            }
        }

        function updateLobbyUI() {
            const pList = document.getElementById('player-list');
            pList.innerHTML = '';
            let count = 0;
            for (let id in playersData) {
                if (!playersData[id].connected) continue;
                count++;
                const badge = document.createElement('div');
                badge.className = 'bg-yellow-500/20 border border-yellow-400/50 px-4 py-2 rounded-full font-bold text-lg text-yellow-100';
                badge.innerHTML = `<i class="fa-solid fa-star text-yellow-500 text-sm mr-1"></i> ${playersData[id].name}`;
                pList.appendChild(badge);
            }
            document.getElementById('player-count').innerText = count;
            document.getElementById('start-game-btn').disabled = count === 0;
        }

        // Send to one player only if their connection is alive (won't crash on dropped phones)
        function safeSend(player, msgObj) {
            try {
                if (player && player.conn && player.conn.open) player.conn.send(msgObj);
            } catch (e) { /* ignore dead connection */ }
        }

        function broadcast(msgObj) {
            for (let id in playersData) {
                safeSend(playersData[id], msgObj);
            }
        }

        function startHostGame() {
            currentQIndex = 0;
            gameStarted = true;
            for(let id in playersData) playersData[id].score = 0;
            hostLoadQuestion();
        }

        function hostLoadQuestion() {
            hideAll();
            gamePhase = 'question';
            document.getElementById('host-quiz').classList.remove('hidden');
            document.getElementById('host-quiz').classList.add('flex');
            
            const q = questions[currentQIndex];
            document.getElementById('host-q-current').innerText = currentQIndex + 1;
            document.getElementById('host-q-text').innerText = q.q;
            
            for(let i=0; i<4; i++) {
                document.getElementById(`host-t-${i}`).innerText = q.options[i];
                const optDiv = document.getElementById(`host-opt-${i}`);
                optDiv.style.opacity = '1';
                optDiv.style.transform = 'scale(1)';
                optDiv.classList.remove('border-4', 'border-yellow-400', 'shadow-[0_0_40px_rgba(250,204,21,0.8)]', 'z-10');
                document.getElementById(`host-count-${i}`).classList.add('hidden');
                document.getElementById(`host-count-${i}`).innerText = '0';
            }
            
            document.getElementById('host-reveal-btn').classList.remove('hidden');
            document.getElementById('host-next-btn').classList.add('hidden');
            
            for (let id in playersData) playersData[id].currentAnswer = null;
            updateAnsweredCount();

            broadcast({ type: 'STATE_QUESTION', qNum: currentQIndex + 1 });
        }

        function updateAnsweredCount() {
            let count = 0;
            for (let id in playersData) {
                if (playersData[id].currentAnswer !== null) count++;
            }
            document.getElementById('answered-count').innerText = count;
        }

        function hostRevealAnswer() {
            gamePhase = 'reveal';
            const correctIndex = questions[currentQIndex].answer;
            let answerCounts = [0, 0, 0, 0];

            for (let id in playersData) {
                const pAns = playersData[id].currentAnswer;
                if (pAns !== null) answerCounts[pAns]++;
                
                if (pAns === correctIndex) {
                    playersData[id].score += 1000; 
                    safeSend(playersData[id], { type: 'STATE_RESULT', correct: true, score: playersData[id].score });
                } else {
                    safeSend(playersData[id], { type: 'STATE_RESULT', correct: false, score: playersData[id].score });
                }
            }

            for(let i=0; i<4; i++) {
                const optDiv = document.getElementById(`host-opt-${i}`);
                const countSpan = document.getElementById(`host-count-${i}`);
                countSpan.innerText = answerCounts[i];
                countSpan.classList.remove('hidden');

                if(i === correctIndex) {
                    optDiv.classList.add('border-4', 'border-yellow-400', 'shadow-[0_0_40px_rgba(250,204,21,0.8)]');
                    optDiv.style.transform = 'scale(1.05)';
                    optDiv.style.zIndex = '10';
                } else {
                    optDiv.style.opacity = '0.3';
                    optDiv.style.transform = 'scale(0.95)';
                    optDiv.style.zIndex = '1';
                }
            }

            document.getElementById('host-reveal-btn').classList.add('hidden');
            document.getElementById('host-next-btn').classList.remove('hidden');
            fireConfetti();
        }

        function hostShowLeaderboard() {
            hideAll();
            gamePhase = 'leaderboard';
            document.getElementById('host-leaderboard').classList.remove('hidden');
            document.getElementById('host-leaderboard').classList.add('flex');

            let sorted = Object.values(playersData).sort((a, b) => b.score - a.score);
            const listObj = document.getElementById('leaderboard-list');
            listObj.innerHTML = '';

            for(let i=0; i<Math.min(5, sorted.length); i++) {
                const p = sorted[i];
                const row = document.createElement('div');
                row.className = `leaderboard-row text-white rounded-2xl p-4 flex justify-between items-center`;
                row.style.animationDelay = `${i * 0.1}s`;
                
                let rankIcon = `<span class="text-3xl font-bold text-slate-500 w-10">${i+1}.</span>`;
                if(i===0) rankIcon = `<i class="fa-solid fa-trophy text-4xl text-yellow-400 w-10 drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]"></i>`;
                if(i===1) rankIcon = `<i class="fa-solid fa-medal text-4xl text-slate-300 w-10"></i>`;
                if(i===2) rankIcon = `<i class="fa-solid fa-medal text-4xl text-amber-700 w-10"></i>`;

                row.innerHTML = `
                    <div class="flex items-center">
                        ${rankIcon}
                        <span class="text-3xl font-bold ml-6">${p.name}</span>
                    </div>
                    <span class="text-4xl font-black text-yellow-400">${p.score}</span>
                `;
                listObj.appendChild(row);
            }

            broadcast({ type: 'STATE_WAITING', msg: "請望大電視睇排名！" });
        }

        function hostNextQuestion() {
            currentQIndex++;
            if(currentQIndex < questions.length) {
                hostLoadQuestion();
            } else {
                // Finale
                hideAll();
                gamePhase = 'finale';
                document.getElementById('host-finale').classList.remove('hidden');
                document.getElementById('host-finale').classList.add('flex');
                
                let sorted = Object.values(playersData).sort((a, b) => b.score - a.score);
                const finaleList = document.getElementById('finale-list');
                finaleList.innerHTML = '';
                
                for(let i=0; i<Math.min(10, sorted.length); i++) {
                    const p = sorted[i];
                    const row = document.createElement('div');
                    row.className = `finale-row flex justify-between items-center`;
                    let prefix = i < 3 ? `<i class="fa-solid fa-star text-yellow-400 mr-2"></i>` : `<span class="text-slate-400 mr-2">${i+1}.</span>`;
                    
                    row.innerHTML = `
                        <div class="text-xl font-bold text-white truncate pr-2">${prefix}${p.name}</div>
                        <div class="text-2xl font-black text-yellow-400">${p.score}</div>
                    `;
                    finaleList.appendChild(row);
                }

                broadcast({ type: 'STATE_WAITING', msg: "全集完滿結束！多謝參與！" });
                finaleConfetti();
            }
        }

        /* ==================== PLAYER LOGIC ==================== */

        function joinGame() {
            const nameInput = document.getElementById('player-name-input').value.trim();
            if(!nameInput) return alert("請輸入大名！");

            myName = nameInput;
            try { localStorage.setItem('quiz_player_name', myName); } catch(e) {}
            document.getElementById('my-name-display').innerText = myName;
            document.getElementById('join-status').classList.remove('hidden');
            manualClose = false;
            connectToHost();
        }

        // Build (or rebuild) the connection to the host. Safe to call repeatedly.
        function connectToHost() {
            if (!hostId) return;
            // Always start from a fresh peer for a clean reconnect
            if (peer && !peer.destroyed) { try { peer.destroy(); } catch(e) {} }

            peer = new Peer();
            peer.on('open', () => {
                hostConn = peer.connect(hostId, { reliable: true });

                hostConn.on('open', () => {
                    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
                    showReconnecting(false);
                    document.getElementById('join-status').classList.add('hidden');
                    hostConn.send({ type: 'JOIN', name: myName, clientId: myClientId });
                });
                hostConn.on('data', (data) => handleHostMessage(data));
                hostConn.on('close', () => { if (!manualClose) scheduleReconnect(); });
                hostConn.on('error', () => { if (!manualClose) scheduleReconnect(); });
            });

            peer.on('error', (err) => {
                console.warn('Peer error:', err && err.type);
                if (!manualClose) scheduleReconnect();
            });
            peer.on('disconnected', () => { if (!manualClose) scheduleReconnect(); });
        }

        // Try again in a few seconds (only one attempt queued at a time)
        function scheduleReconnect() {
            if (manualClose || reconnectTimer) return;
            showReconnecting(true);
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                connectToHost();
            }, 2500);
        }

        function showReconnecting(show) {
            const el = document.getElementById('reconnect-overlay');
            if (!el) return;
            if (show) { el.classList.remove('hidden'); el.classList.add('flex'); }
            else { el.classList.add('hidden'); el.classList.remove('flex'); }
        }

        function setMyScore(s) {
            if (typeof s !== 'number') return;
            myScore = s;
            const a = document.getElementById('my-score');   if (a) a.innerText = s;
            const b = document.getElementById('result-score'); if (b) b.innerText = s;
        }

        function handleHostMessage(data) {
            showReconnecting(false);
            if (data.type === 'JOIN_SUCCESS') {
                setMyScore(data.score);
                hideAll();
                document.getElementById('player-wait').classList.remove('hidden');
                document.getElementById('player-wait').classList.add('flex');
                document.getElementById('player-wait').querySelector('p').innerText = '請望住大電視，等候 Polly 姐發辦...';
                document.getElementById('my-name-display').innerText = myName;
            }
            if (data.type === 'STATE_QUESTION') {
                setMyScore(data.score);
                hideAll();
                const quizScreen = document.getElementById('player-quiz');
                quizScreen.classList.remove('hidden');
                // 確保強制轉為 flex 以顯示 grid
                quizScreen.classList.add('flex');
                
                document.getElementById('player-q-current').innerText = data.qNum;
                
                const answeredMsg = document.getElementById('player-answered-msg');
                answeredMsg.classList.add('hidden');
                answeredMsg.classList.remove('flex');
                
                for(let i=0; i<4; i++) {
                    const btn = document.getElementById(`p-btn-${i}`);
                    btn.disabled = false;
                    // 確保禁用的透明度重置
                    btn.style.opacity = '1';
                }
            }
            if (data.type === 'STATE_RESULT') {
                hideAll();
                const resScreen = document.getElementById('player-result');
                resScreen.classList.remove('hidden');
                resScreen.classList.add('flex');
                
                const icon = document.getElementById('result-icon');
                const title = document.getElementById('result-title');
                myScore = data.score;
                document.getElementById('result-score').innerText = myScore;
                document.getElementById('my-score').innerText = myScore;

                if (data.correct) {
                    resScreen.className = "z-10 flex flex-col items-center justify-center w-full h-full p-8 text-center bg-green-500 text-white";
                    icon.className = "fa-solid fa-face-laugh-squint text-9xl mb-6 drop-shadow-lg";
                    title.innerText = "中咗！好嘢！";
                } else {
                    resScreen.className = "z-10 flex flex-col items-center justify-center w-full h-full p-8 text-center bg-red-600 text-white";
                    icon.className = "fa-solid fa-face-dizzy text-9xl mb-6 drop-shadow-lg";
                    title.innerText = "哎呀！答錯咗！";
                }
            }
            if (data.type === 'STATE_WAITING') {
                setMyScore(data.score);
                hideAll();
                document.getElementById('player-wait').classList.remove('hidden');
                document.getElementById('player-wait').classList.add('flex');
                document.getElementById('player-wait').querySelector('p').innerText = data.msg;
            }
        }

        function submitAnswer(ansIndex) {
            for(let i=0; i<4; i++) document.getElementById(`p-btn-${i}`).disabled = true;
            
            const msgObj = document.getElementById('player-answered-msg');
            msgObj.classList.remove('hidden');
            msgObj.classList.add('flex');

            try {
                if (hostConn && hostConn.open) {
                    hostConn.send({ type: 'ANSWER', answer: ansIndex });
                } else {
                    scheduleReconnect();   // on reconnect the host re-sends the question so you can answer again
                }
            } catch (e) {
                scheduleReconnect();
            }
        }

        /* ==================== EFFECTS ==================== */
        
        function fireConfetti() {
            const count = 250;
            const defaults = { origin: { y: 0.7 }, colors: ['#fbbf24', '#f59e0b', '#d97706', '#ffffff'] };
            function fire(particleRatio, opts) { confetti(Object.assign({}, defaults, opts, { particleCount: Math.floor(count * particleRatio) })); }
            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        function finaleConfetti() {
            const duration = 15 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0, colors: ['#fbbf24', '#ef4444', '#3b82f6', '#10b981'] };
            function randomInRange(min, max) { return Math.random() * (max - min) + min; }
            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
